<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <script src="../js/navbar.js" defer></script>
    <script src="../js/money_rain.js" defer></script>
    <script src="../js/landing.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="navbar">
    </div>
    <div class="container">
        <div class="left-panel" id="left">
            <canvas id="money_rain"></canvas>
            <div class="fg-layer">
                <h1>Game Info</h1>
                <div class="info-container">
                    <ul>
                        <li>dfjsiisuiudhfsuhifdsuihfdsuhifdsuhidfshuidsuihfsduifhidus 89ye89w ry89werwyenr9w8</li>
                        <li>Game info 2</li>
                        <li>Game info 3</li>
                    </ul>
                </div>
            </div>
            <img src="../assets/gold_pile.png" class="gold_pile"> 
        </div>
        <div class="right-panel">
            <h1>Login Account</h1>
            <form>
                <label for="uname">Username</label>
                <input type="text" id="uname" name="uname" placeholder="Enter your username">
                <label for="pass">Password</label>
                <input type="text" id="pass" name="pass" placeholder="Enter your password">
                <div class="tangibles-row">
                    <label class="checkbox-group">
                        <input type="checkbox" id="signed_in">
                        <span style="padding-left: 5px;">Keep me signed in</span>
                    </label>
                    <a href="forgot_pass.html">Forgot password?</a> <!-- href placeholder -->
                </div>
                <div class="submit-button">
                    <button type="button" class="button-style" id="enter-game">Login</button>
                    <a href="sign_up.html">Don't have a account? Sign up here!</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
