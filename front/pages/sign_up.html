<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <script type="module" src="../js/sign_up.js" defer></script>
    <script src="../js/navbar.js" defer></script>
    <script src="../js/snow_flake.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="navbar">
    </div>
    <div class="snow-wrapper" id="sn_wrapper">
        <canvas id="snowflakes"></canvas>
        <div class="container" style="align-items: center; height: 100vh; flex-direction: column;">
            <h1>Create Your Account!</h1>
            <div>
                <form id="sign_up_form">
                    <label for="email">Email address</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email" required>
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter a username" required>
                    <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" placeholder="*******" required>
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="********" required>
                    <div class="tangibles_row">
                        <div class="checkbox-group">
                            <span id="error" class="er"></span>
                        </div>
                    </div>
                    <div class="submit-button-row">
                        <button class="btn-inactive" id="submit_btn" disabled>Sign up!</button>
                        <a href="landing.html">Already have a account? Login here!</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
